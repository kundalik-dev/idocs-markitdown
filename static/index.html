<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>iDocs — MarkItDown</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" id="md-theme-sheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.6.1/github-markdown-dark.min.css" />
  <script>
    (function () {
      var MD_LIGHT = "https://cdn.jsdelivr.net/npm/github-markdown-css@5.6.1/github-markdown.min.css";
      var MD_DARK = "https://cdn.jsdelivr.net/npm/github-markdown-css@5.6.1/github-markdown-dark.min.css";
      var saved = null;
      try {
        saved = localStorage.getItem("idocs-theme");
      } catch (e) {}
      var theme =
        saved === "light" || saved === "dark"
          ? saved
          : window.matchMedia("(prefers-color-scheme: light)").matches
            ? "light"
            : "dark";
      document.documentElement.setAttribute("data-theme", theme);
      var link = document.getElementById("md-theme-sheet");
      if (link) {
        link.href = theme === "light" ? MD_LIGHT : MD_DARK;
      }
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --font: "Inter", ui-sans-serif, system-ui, -apple-system, sans-serif;
      --font-mono: "JetBrains Mono", ui-monospace, monospace;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 1px 2px rgba(0, 0, 0, 0.35), 0 8px 24px rgba(0, 0, 0, 0.45);
      --bg: #0c0f14;
      --bg-elevated: #12171f;
      --surface: #161c26;
      --surface-hover: #1c2430;
      --border: rgba(255, 255, 255, 0.08);
      --border-strong: rgba(255, 255, 255, 0.12);
      --text: #f0f3f8;
      --text-muted: #8b96a8;
      --accent: #4ea1ff;
      --accent-hover: #6eb4ff;
      --accent-muted: rgba(78, 161, 255, 0.15);
      --danger: #f87171;
      --danger-bg: rgba(248, 113, 113, 0.12);
      --preview-bg: #0d1117;
      --preview-muted: #161b22;
      --preview-border: rgba(255, 255, 255, 0.08);
      --preview-text: #e6edf3;
      --view-tab-inactive: #a3b0c4;
    }

    [data-theme="light"] {
      color-scheme: light;
      --bg: #f4f6f9;
      --bg-elevated: #ffffff;
      --surface: #ffffff;
      --surface-hover: #f0f2f6;
      --border: rgba(15, 23, 42, 0.08);
      --border-strong: rgba(15, 23, 42, 0.12);
      --text: #0f172a;
      --text-muted: #64748b;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --accent-muted: rgba(37, 99, 235, 0.1);
      --danger: #dc2626;
      --danger-bg: rgba(220, 38, 38, 0.08);
      --preview-bg: #fafbfc;
      --preview-muted: #f6f8fa;
      --preview-border: rgba(15, 23, 42, 0.1);
      --preview-text: #1f2328;
      --shadow: 0 1px 2px rgba(15, 23, 42, 0.06), 0 8px 24px rgba(15, 23, 42, 0.08);
      --view-tab-inactive: #334155;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      min-height: 100%;
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.5;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .app {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      max-width: 1440px;
      margin: 0 auto;
      padding: 1.25rem 1.25rem 1.5rem;
      gap: 1rem;
    }

    @media (min-width: 768px) {
      .app { padding: 1.5rem 2rem 2rem; gap: 1.25rem; }
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .brand h1 {
      margin: 0;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.2;
    }

    .brand p {
      margin: 0.4rem 0 0;
      font-size: 0.875rem;
      color: var(--text-muted);
      max-width: 36rem;
      line-height: 1.55;
    }

    .theme-toggle {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.5rem 0.75rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-family: var(--font);
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .theme-toggle:hover {
      background: var(--surface-hover);
      border-color: var(--border-strong);
    }
    .theme-toggle .icon { font-size: 1rem; line-height: 1; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem 0.65rem;
      padding: 0.85rem 1rem;
    }

    @media (min-width: 640px) {
      .toolbar { padding: 1rem 1.15rem; gap: 0.6rem 0.75rem; }
    }

    .toolbar label.file-btn {
      cursor: pointer;
      padding: 0.5rem 1rem;
      border-radius: var(--radius-sm);
      background: var(--accent);
      color: #fff;
      font-size: 0.8125rem;
      font-weight: 600;
      border: none;
      transition: background 0.15s, transform 0.1s;
    }
    [data-theme="light"] .toolbar label.file-btn { color: #fff; }
    .toolbar label.file-btn:hover {
      background: var(--accent-hover);
    }
    .toolbar label.file-btn:active { transform: scale(0.98); }
    .toolbar input[type="file"] { display: none; }

    button.action {
      cursor: pointer;
      padding: 0.5rem 0.9rem;
      border-radius: var(--radius-sm);
      background: var(--surface-hover);
      color: var(--text);
      font-family: var(--font);
      font-size: 0.8125rem;
      font-weight: 500;
      border: 1px solid var(--border);
      transition: border-color 0.15s, background 0.15s;
    }
    button.action:hover:not(:disabled) {
      border-color: var(--accent);
      background: var(--accent-muted);
    }
    button.action:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .fname {
      font-size: 0.8125rem;
      color: var(--text-muted);
      flex: 1;
      min-width: 10rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .spinner {
      display: inline-block;
      width: 1rem;
      height: 1rem;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      visibility: hidden;
    }
    .spinner.on { visibility: visible; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .err {
      margin: 0;
      padding: 0.75rem 1rem;
      border-radius: var(--radius-sm);
      background: var(--danger-bg);
      color: var(--danger);
      font-size: 0.875rem;
      display: none;
    }
    .err.visible { display: block; }

    .view-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 0.65rem 1rem 0.85rem;
      border-top: 1px solid var(--border);
    }

    .segmented {
      display: inline-flex;
      padding: 3px;
      border-radius: var(--radius-sm);
      background: var(--bg);
      border: 1px solid var(--border);
    }

    .segmented button {
      position: relative;
      border: none;
      background: transparent;
      color: var(--view-tab-inactive);
      font-family: var(--font);
      font-size: 0.8125rem;
      font-weight: 500;
      padding: 0.45rem 0.85rem;
      border-radius: 6px;
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
    }
    .segmented button:hover { color: var(--text); }
    .segmented button.active {
      color: var(--text);
      background: var(--surface-hover);
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.12);
    }
    [data-theme="light"] .segmented button.active {
      background: #fff;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.08);
    }

    .hint {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .workspace {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr;
      min-height: min(70vh, 720px);
      overflow: hidden;
    }

    @media (max-width: 900px) {
      .workspace[data-view="split"] {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
        min-height: auto;
      }
    }

    .workspace[data-view="markdown"],
    .workspace[data-view="preview"] {
      grid-template-columns: 1fr;
    }

    .workspace[data-view="markdown"] .pane-preview { display: none !important; }
    .workspace[data-view="preview"] .pane-source { display: none !important; }

    .pane {
      display: flex;
      flex-direction: column;
      min-height: 280px;
      border-right: 1px solid var(--border);
    }
    .pane:last-child { border-right: none; }

    @media (max-width: 900px) {
      .workspace[data-view="split"] .pane-source {
        border-right: none;
        border-bottom: 1px solid var(--border);
        min-height: 240px;
      }
    }

    .pane-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.55rem 1rem;
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    #raw-md {
      flex: 1;
      width: 100%;
      margin: 0;
      padding: 1rem 1.1rem;
      resize: none;
      border: none;
      background: var(--bg-elevated);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.8125rem;
      line-height: 1.6;
    }
    #raw-md::placeholder { color: var(--text-muted); opacity: 0.7; }
    #raw-md:focus {
      outline: none;
      box-shadow: inset 0 0 0 2px var(--accent-muted);
    }

    .preview-wrap {
      flex: 1;
      overflow: auto;
      padding: 1.25rem 1.35rem 1.75rem;
      background: var(--preview-bg);
      color: var(--preview-text);
      border-left: 1px solid var(--preview-border);
    }

    @media (max-width: 900px) {
      .preview-wrap { border-left: none; border-top: 1px solid var(--preview-border); }
    }

    .workspace[data-view="markdown"] .preview-wrap { border: none; }
    .workspace[data-view="preview"] .preview-wrap { border: none; }

    .preview-inner {
      max-width: 920px;
      margin: 0 auto;
      padding: 1.25rem 1.35rem;
      border-radius: var(--radius-sm);
      background: var(--preview-muted);
      border: 1px solid var(--preview-border);
    }

    [data-theme="light"] .preview-inner {
      background: #ffffff;
      border-color: rgba(15, 23, 42, 0.12);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    [data-theme="dark"] .preview-inner {
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .markdown-body {
      box-sizing: border-box;
      min-width: 0;
      max-width: 100%;
      margin: 0;
      font-size: 0.9375rem;
      /* Let GitHub markdown CSS control text/link colors; only strip a solid panel bg */
      background-color: transparent !important;
    }

    /*
      github-markdown-css sets --fgColor-* on .markdown-body only inside
      @media (prefers-color-scheme: …). If the OS is dark but the app theme is light
      (or the reverse), preview text becomes the wrong palette. Tie tokens to our
      data-theme so preview always matches the selected theme.
    */
    [data-theme="light"] .markdown-body {
      color-scheme: light;
      --focus-outlineColor: #0969da;
      --fgColor-default: #1f2328;
      --fgColor-muted: #636c76;
      --fgColor-accent: #0969da;
      --fgColor-success: #1a7f37;
      --fgColor-attention: #9a6700;
      --fgColor-danger: #d1242f;
      --fgColor-done: #8250df;
      --bgColor-default: #ffffff;
      --bgColor-muted: #f6f8fa;
      --bgColor-neutral-muted: #afb8c133;
      --bgColor-attention-muted: #fff8c5;
      --borderColor-default: #d0d7de;
      --borderColor-muted: #d0d7deb3;
      --borderColor-neutral-muted: #afb8c133;
      --borderColor-accent-emphasis: #0969da;
      --borderColor-success-emphasis: #1a7f37;
      --borderColor-attention-emphasis: #bf8700;
      --borderColor-danger-emphasis: #cf222e;
      --borderColor-done-emphasis: #8250df;
      --color-prettylights-syntax-comment: #57606a;
      --color-prettylights-syntax-constant: #0550ae;
      --color-prettylights-syntax-constant-other-reference-link: #0a3069;
      --color-prettylights-syntax-entity: #6639ba;
      --color-prettylights-syntax-storage-modifier-import: #24292f;
      --color-prettylights-syntax-entity-tag: #0550ae;
      --color-prettylights-syntax-keyword: #cf222e;
      --color-prettylights-syntax-string: #0a3069;
      --color-prettylights-syntax-variable: #953800;
      --color-prettylights-syntax-brackethighlighter-unmatched: #82071e;
      --color-prettylights-syntax-brackethighlighter-angle: #57606a;
      --color-prettylights-syntax-invalid-illegal-text: #f6f8fa;
      --color-prettylights-syntax-invalid-illegal-bg: #82071e;
      --color-prettylights-syntax-carriage-return-text: #f6f8fa;
      --color-prettylights-syntax-carriage-return-bg: #cf222e;
      --color-prettylights-syntax-string-regexp: #116329;
      --color-prettylights-syntax-markup-list: #3b2300;
      --color-prettylights-syntax-markup-heading: #0550ae;
      --color-prettylights-syntax-markup-italic: #24292f;
      --color-prettylights-syntax-markup-bold: #24292f;
      --color-prettylights-syntax-markup-deleted-text: #82071e;
      --color-prettylights-syntax-markup-deleted-bg: #ffebe9;
      --color-prettylights-syntax-markup-inserted-text: #116329;
      --color-prettylights-syntax-markup-inserted-bg: #dafbe1;
      --color-prettylights-syntax-markup-changed-text: #953800;
      --color-prettylights-syntax-markup-changed-bg: #ffd8b5;
      --color-prettylights-syntax-markup-ignored-text: #eaeef2;
      --color-prettylights-syntax-markup-ignored-bg: #0550ae;
      --color-prettylights-syntax-meta-diff-range: #8250df;
      --color-prettylights-syntax-sublimelinter-gutter-mark: #8c959f;
    }

    [data-theme="dark"] .markdown-body {
      color-scheme: dark;
      --focus-outlineColor: #1f6feb;
      --fgColor-default: #e6edf3;
      --fgColor-muted: #8d96a0;
      --fgColor-accent: #4493f8;
      --fgColor-success: #3fb950;
      --fgColor-attention: #d29922;
      --fgColor-danger: #f85149;
      --fgColor-done: #ab7df8;
      --bgColor-default: #0d1117;
      --bgColor-muted: #161b22;
      --bgColor-neutral-muted: #6e768166;
      --bgColor-attention-muted: #bb800926;
      --borderColor-default: #30363d;
      --borderColor-muted: #30363db3;
      --borderColor-neutral-muted: #6e768166;
      --borderColor-accent-emphasis: #1f6feb;
      --borderColor-success-emphasis: #238636;
      --borderColor-attention-emphasis: #9e6a03;
      --borderColor-danger-emphasis: #da3633;
      --borderColor-done-emphasis: #8957e5;
      --color-prettylights-syntax-comment: #8b949e;
      --color-prettylights-syntax-constant: #79c0ff;
      --color-prettylights-syntax-constant-other-reference-link: #a5d6ff;
      --color-prettylights-syntax-entity: #d2a8ff;
      --color-prettylights-syntax-storage-modifier-import: #c9d1d9;
      --color-prettylights-syntax-entity-tag: #7ee787;
      --color-prettylights-syntax-keyword: #ff7b72;
      --color-prettylights-syntax-string: #a5d6ff;
      --color-prettylights-syntax-variable: #ffa657;
      --color-prettylights-syntax-brackethighlighter-unmatched: #f85149;
      --color-prettylights-syntax-brackethighlighter-angle: #8b949e;
      --color-prettylights-syntax-invalid-illegal-text: #f0f6fc;
      --color-prettylights-syntax-invalid-illegal-bg: #8e1519;
      --color-prettylights-syntax-carriage-return-text: #f0f6fc;
      --color-prettylights-syntax-carriage-return-bg: #b62324;
      --color-prettylights-syntax-string-regexp: #7ee787;
      --color-prettylights-syntax-markup-list: #f2cc60;
      --color-prettylights-syntax-markup-heading: #1f6feb;
      --color-prettylights-syntax-markup-italic: #c9d1d9;
      --color-prettylights-syntax-markup-bold: #c9d1d9;
      --color-prettylights-syntax-markup-deleted-text: #ffdcd7;
      --color-prettylights-syntax-markup-deleted-bg: #67060c;
      --color-prettylights-syntax-markup-inserted-text: #aff5b4;
      --color-prettylights-syntax-markup-inserted-bg: #033a16;
      --color-prettylights-syntax-markup-changed-text: #ffdfb6;
      --color-prettylights-syntax-markup-changed-bg: #5a1e02;
      --color-prettylights-syntax-markup-ignored-text: #c9d1d9;
      --color-prettylights-syntax-markup-ignored-bg: #1158c7;
      --color-prettylights-syntax-meta-diff-range: #d2a8ff;
      --color-prettylights-syntax-sublimelinter-gutter-mark: #484f58;
    }

  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <h1>iDocs</h1>
        <p>
          Turn PDFs, Office files, images, HTML, and more into Markdown with
          <a href="https://github.com/microsoft/markitdown">Microsoft MarkItDown</a>.
          Switch views below to edit source, preview, or see both.
        </p>
      </div>
      <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Toggle light and dark theme" title="Theme">
        <span class="icon" id="theme-icon" aria-hidden="true">🌙</span>
        <span id="theme-label">Dark</span>
      </button>
    </header>

    <div class="card">
      <div class="toolbar">
        <label class="file-btn">
          Choose file
          <input id="file-input" type="file" />
        </label>
        <button type="button" class="action" id="btn-convert" disabled>Convert</button>
        <button type="button" class="action" id="btn-copy">Copy Markdown</button>
        <button type="button" class="action" id="btn-download">Download .md</button>
        <span class="fname" id="file-label">No file selected</span>
        <span class="spinner" id="spinner" aria-hidden="true"></span>
      </div>

      <div class="view-toolbar">
        <div class="segmented" role="tablist" aria-label="Content view">
          <button type="button" role="tab" data-view="split" class="active" aria-selected="true">Split</button>
          <button type="button" role="tab" data-view="markdown" aria-selected="false">Markdown</button>
          <button type="button" role="tab" data-view="preview" aria-selected="false">Preview</button>
        </div>
        <span class="hint" id="view-hint">Source and preview side by side</span>
      </div>
    </div>

    <div class="err card" id="err" role="alert" style="box-shadow: none; padding: 0.75rem 1rem;"></div>

    <div class="card workspace" id="workspace" data-view="split">
      <section class="pane pane-source" id="pane-source">
        <div class="pane-header">
          <span>Markdown source</span>
        </div>
        <textarea id="raw-md" placeholder="Choose a file and click Convert, or paste Markdown here…" spellcheck="false"></textarea>
      </section>
      <section class="pane pane-preview" id="pane-preview">
        <div class="pane-header">
          <span>Rendered preview</span>
        </div>
        <div class="preview-wrap">
          <div class="preview-inner">
            <div id="md-preview" class="markdown-body"></div>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script>
    (function () {
      const STORAGE_THEME = "idocs-theme";
      const STORAGE_VIEW = "idocs-view";

      const fileInput = document.getElementById("file-input");
      const btnConvert = document.getElementById("btn-convert");
      const btnCopy = document.getElementById("btn-copy");
      const btnDownload = document.getElementById("btn-download");
      const fileLabel = document.getElementById("file-label");
      const rawMd = document.getElementById("raw-md");
      const mdPreview = document.getElementById("md-preview");
      const errEl = document.getElementById("err");
      const spinner = document.getElementById("spinner");
      const workspace = document.getElementById("workspace");
      const themeToggle = document.getElementById("theme-toggle");
      const themeIcon = document.getElementById("theme-icon");
      const themeLabel = document.getElementById("theme-label");
      const viewHint = document.getElementById("view-hint");
      const mdThemeSheet = document.getElementById("md-theme-sheet");
      const MD_CSS_LIGHT =
        "https://cdn.jsdelivr.net/npm/github-markdown-css@5.6.1/github-markdown.min.css";
      const MD_CSS_DARK =
        "https://cdn.jsdelivr.net/npm/github-markdown-css@5.6.1/github-markdown-dark.min.css";

      const viewHints = {
        split: "Source and preview together",
        markdown: "Markdown source only — edit and copy",
        preview: "Rendered preview only — read formatted output",
      };

      let selectedFile = null;
      let lastBasename = "document";

      function showErr(msg) {
        errEl.textContent = msg || "";
        errEl.classList.toggle("visible", !!msg);
      }

      function renderPreview() {
        const md = rawMd.value;
        if (!md.trim()) {
          mdPreview.innerHTML = "";
          return;
        }
        const html = marked.parse(md, { gfm: true, breaks: false });
        mdPreview.innerHTML = DOMPurify.sanitize(html, { USE_PROFILES: { html: true } });
      }

      function applyTheme(theme) {
        const root = document.documentElement;
        root.setAttribute("data-theme", theme);
        themeIcon.textContent = theme === "dark" ? "🌙" : "☀️";
        themeLabel.textContent = theme === "dark" ? "Dark" : "Light";
        localStorage.setItem(STORAGE_THEME, theme);
        if (mdThemeSheet) {
          mdThemeSheet.href = theme === "light" ? MD_CSS_LIGHT : MD_CSS_DARK;
        }
      }

      function initTheme() {
        const saved = localStorage.getItem(STORAGE_THEME);
        if (saved === "light" || saved === "dark") {
          applyTheme(saved);
          return;
        }
        const prefersLight = window.matchMedia("(prefers-color-scheme: light)").matches;
        applyTheme(prefersLight ? "light" : "dark");
      }

      themeToggle.addEventListener("click", () => {
        const next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
        applyTheme(next);
      });

      function setView(mode) {
        workspace.setAttribute("data-view", mode);
        localStorage.setItem(STORAGE_VIEW, mode);
        viewHint.textContent = viewHints[mode] || "";

        document.querySelectorAll(".segmented button").forEach((b) => {
          const on = b.getAttribute("data-view") === mode;
          b.classList.toggle("active", on);
          b.setAttribute("aria-selected", on ? "true" : "false");
        });
      }

      function initView() {
        const saved = localStorage.getItem(STORAGE_VIEW);
        if (saved === "split" || saved === "markdown" || saved === "preview") {
          setView(saved);
        }
      }

      fileInput.addEventListener("change", () => {
        const f = fileInput.files && fileInput.files[0];
        selectedFile = f || null;
        btnConvert.disabled = !selectedFile;
        fileLabel.textContent = f ? f.name : "No file selected";
        showErr("");
      });

      rawMd.addEventListener("input", () => {
        renderPreview();
        showErr("");
      });

      btnConvert.addEventListener("click", async () => {
        if (!selectedFile) return;
        showErr("");
        spinner.classList.add("on");
        btnConvert.disabled = true;
        try {
          const fd = new FormData();
          fd.append("file", selectedFile);
          const res = await fetch("/api/convert", { method: "POST", body: fd });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            const d = data.detail;
            const msg =
              typeof d === "string"
                ? d
                : Array.isArray(d)
                  ? d.map((x) => x.msg || JSON.stringify(x)).join("; ")
                  : res.statusText || "Conversion failed";
            throw new Error(msg);
          }
          rawMd.value = data.markdown || "";
          lastBasename = (data.filename || "document").replace(/\.[^.]+$/, "") || "document";
          renderPreview();
        } catch (e) {
          showErr(e.message || String(e));
        } finally {
          spinner.classList.remove("on");
          btnConvert.disabled = !selectedFile;
        }
      });

      btnCopy.addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(rawMd.value);
        } catch {
          showErr("Could not copy to clipboard.");
        }
      });

      btnDownload.addEventListener("click", () => {
        const blob = new Blob([rawMd.value], { type: "text/markdown;charset=utf-8" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = lastBasename + ".md";
        a.click();
        URL.revokeObjectURL(a.href);
      });

      document.querySelectorAll(".segmented button").forEach((btn) => {
        btn.addEventListener("click", () => {
          setView(btn.getAttribute("data-view"));
        });
      });

      initTheme();
      initView();
      renderPreview();
    })();
  </script>
</body>
</html>
